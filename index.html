<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#64a243">
  <meta name="description" content="Play chess and have fun! A friendly chess game for two players - make your moves and become a chess champion!">
  <title>Play Chess - Fun Chess Game for Everyone</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Toast Containers -->
  <div id="toast-container-top" class="toast-container top-toast"></div>
  <div id="toast-container-bottom" class="toast-container bottom-toast"></div>

  <!-- Top Player Controls (Black) -->
  <div class="player-zone top-player">
    <div class="player-toggle" onclick="togglePlayerControls('top')">
      <span class="player-label">⚫ Black Player</span>
    </div>
    <div class="player-controls" id="top-controls">
      <div class="player-info">
        <div class="player-status" id="black-status">Ready to play!</div>
      </div>
      <div class="game-status-inline">
        <div class="turn-indicator">Turn: <span id="current-turn-top" class="turn-badge white">White</span></div>
        <div class="game-info">
          <div class="move-counter" id="move-counter-top">0 moves</div>
          <div class="game-timer" id="game-timer-top">00:00</div>
        </div>
      </div>
      <div class="player-game-controls">
        <button id="flip-board-top" class="control-btn btn btn-primary" title="Flip Board">↻ Flip</button>
        <button id="visual-help-top" class="control-btn btn btn-info" onclick="toggleVisualHelp()" title="Toggle Visual Help">👁 Help</button>
        <button id="reset-game-top" class="control-btn btn btn-danger" title="Reset Game">⟲ Reset</button>
        <button id="undo-btn-top" class="control-btn btn btn-success" title="Undo Move"> ↩ Undo</button>
        <button class="control-btn btn btn-warning" onclick="resignGame('black')" title="Resign">🏳 Resign</button>
        <button class="control-btn btn btn-secondary" onclick="offerDraw()" title="Offer Draw">🤝 Draw</button>
        <label class="control-btn btn btn-dark" title="Toggle Light/Dark Theme"><input type="checkbox" id="pref-theme-top"> 🌓 Theme</label>

      </div>
    </div>
  </div>

  <!-- Game Board Area -->
  <div class="game-area-center">
    <div class="chess-board-container">
      <div class="chess-board" id="chessboard">
        <!-- Chessboard will be generated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Bottom Player Controls (White) -->
  <div class="player-zone bottom-player">
    <div class="player-toggle" onclick="togglePlayerControls('bottom')">
      <span class="player-label">⚪ White Player</span>
    </div>
    <div class="player-controls" id="bottom-controls">
      <div class="player-info">
        <div class="player-status" id="white-status">Your turn!</div>
      </div>
      <div class="game-status-inline">
        <div class="turn-indicator">Turn: <span id="current-turn-bottom" class="turn-badge white">White</span></div>
        <div class="game-info">
          <div class="move-counter" id="move-counter-bottom">0 moves</div>
          <div class="game-timer" id="game-timer-bottom">00:00</div>
        </div>
      </div>
      <div class="player-game-controls">
        <button id="flip-board-bottom" class="control-btn btn btn-primary" title="Flip Board">↻ Flip</button>
        <button id="visual-help-bottom" class="control-btn btn btn-info" onclick="toggleVisualHelp()" title="Toggle Visual Help">👁 Help</button>
        <button id="reset-game-bottom" class="control-btn btn btn-danger" title="Reset Game">⟲ Reset</button>
        <button id="undo-btn-bottom" class="control-btn btn btn-success" title="Undo Move"> ↩ Undo</button>
        <button class="control-btn btn btn-warning" onclick="resignGame('white')" title="Resign">🏳 Resign</button>
        <button class="control-btn btn btn-secondary" onclick="offerDraw()" title="Offer Draw">🤝 Draw</button>
        <label class="control-btn btn btn-dark" title="Toggle Light/Dark Theme"><input type="checkbox" id="pref-theme-bottom"> 🌓 Theme</label>

      </div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div class="game-over-modal" id="game-over-modal" style="display:none;">
    <div class="game-over-content">
      <div class="game-over-title">RESIGNATION!</div>
      <div class="game-over-message">WHITE WINS!</div>
      <button class="power-btn" onclick="startNewGame()" title="Start New Game"></button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
